<% layout("/layouts/dialog", {
	scripts: ["event/addFile"],
	meta: {
		eventID: $.targetEvent.id
	}
}) %>
<h1>Dodawanie dokumentu</h1>
<main>
	<section>
		<h2>Wybierz dokument</h2>
		<input type="file" id="file-input" name="files" accept="application/pdf, image/png, image/jpeg" required>
	</section>
	<section>
		<h2>Nazwa dokumentu</h2>
		<p>Będzie wyświetlana na stronie akcji</p>
		<form>
			<input type="text" id="file-name" name="fileName" placeholder="(dokument bez nazwy)" required>
		</form>
	</section>
	<section>
		<h2>Dostęp do dokumentu</h2>
		<form>
			<input type="checkbox" id="owner-access" name="access" value="owner" checked disabled>
			<label for="owner-access">Komenda akcji i zatwierdzający</label>

			<input type="checkbox" id="role-access" name="access" value="role" checked>
			<label for="role-access">Kadra akcji</label>

			<input type="checkbox" id="participant-access" name="access" value="participant">
			<label for="participant-access">Uczestnicy (w tym nie zaakceptowani)</label>
		</form>
	</section>
</main>
<hr>
<div class="button-row">
	<button>
		<%~ icon`arrow_back` %>
		Anuluj
	</button>
	<button api="event/[eventID]/file/add">
		<%~ icon`note_add` %>
		<span>Dodaj</span>
	</button>
</div>
