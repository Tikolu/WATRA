<% if($.user.$locals.detailsAccess === false) { %>
	<em>Brak dostępu</em>
<% } else if($.user.medical.entries.length) { %>
	<ul>
		<% for(const entry of $.user.medical.entries) { %>
			<li><%= entry.title %></li>
		<% } %>
	</ul>
	<a href="/users/<%= $.user.id %>/medical" class="details-link"><%~ icon`medical_information` %> Szczegóły</a>
<% } %>
